name: Security and Dependency Audit

on:
  pull_request:
    branches: [ main, master, work ]
  push:
    branches: [ main, master, work ]

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run pip-audit (PyPA action)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

  python-tests:
    name: Python tests (${{ matrix.test_suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_suite: unit
            marker: not integration
          - test_suite: integration
            marker: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest (${{ matrix.test_suite }})
        run: |
          mkdir -p artifacts/python-tests
          set -o pipefail
          pytest -q -m "${{ matrix.marker }}" --junitxml="artifacts/python-tests/junit-${{ matrix.test_suite }}.xml" \
            2>&1 | tee "artifacts/python-tests/pytest-${{ matrix.test_suite }}.log"
      - name: Upload pytest artifacts (${{ matrix.test_suite }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-tests-${{ matrix.test_suite }}-artifacts
          path: artifacts/python-tests/
          if-no-files-found: error
          retention-days: 14

  npm-audit:
    name: Dashboard npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (high+)
        run: npm audit --audit-level=high

  dashboard-build-lint:
    name: Dashboard build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint dashboard
        run: npm run lint
      - name: Build dashboard
        run: npm run build
      - name: Upload dashboard build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build-artifacts
          path: |
            dashboard/dist/
            dashboard/npm-debug.log*
            dashboard/.npm/_logs/
          if-no-files-found: warn
          retention-days: 14

  leaked-secret-promotion-guard:
    name: Unsafe promotion guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block promotion if compromise marker exists
        run: |
          if [ -f data/compromised_secret.marker ]; then
            echo "Compromise marker exists. Promotion blocked."
            exit 1
          fi
