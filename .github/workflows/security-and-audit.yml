name: Security and Dependency Audit

on:
  pull_request:
  push:
    branches: [ main, master, work ]

jobs:
  python-tests:
    name: Python tests (deterministic async setup)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            src/autobot/v2/tests/requirements.txt
      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r src/autobot/v2/tests/requirements.txt
      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest -q

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run pip-audit (PyPA action)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

  npm-audit:
    name: Dashboard npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (high+)
        run: npm audit --audit-level=high

  leaked-secret-promotion-guard:
    name: Unsafe promotion guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block promotion if compromise marker exists
        run: |
          if [ -f data/compromised_secret.marker ]; then
            echo "Compromise marker exists. Promotion blocked."
            exit 1
          fi
