name: env-example-check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-required-env-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate required env vars are present in .env.example
        run: python tools/check_required_env_example.py
