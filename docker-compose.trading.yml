version: '3.8'

services:
  # Event Bus - Central de communication
  event-bus:
    image: redis:7-alpine
    container_name: trading-event-bus
    ports:
      - "18789:6379"
    volumes:
      - event-bus-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Agent: Kimi Developer
  kimi-dev:
    image: openclaw/agent:latest
    container_name: kimi-developer
    environment:
      - AGENT_ID=kimi-dev
      - AGENT_MODEL=moonshot/kimi-k2.5
      - AGENT_ROLE=development
      - EVENT_BUS_HOST=event-bus
      - EVENT_BUS_PORT=6379
      - BUDGET_LIMIT=20
      - BUDGET_CURRENCY=EUR
    volumes:
      - ./workspace:/workspace
      - ./trading-team.json:/config/team.json:ro
    depends_on:
      - event-bus
    restart: unless-stopped

  # Agent: Gemini Reviewer
  gemini-reviewer:
    image: openclaw/agent:latest
    container_name: gemini-reviewer
    environment:
      - AGENT_ID=gemini-reviewer
      - AGENT_MODEL=google/gemini-1.5-pro
      - AGENT_ROLE=review
      - EVENT_BUS_HOST=event-bus
      - EVENT_BUS_PORT=6379
      - BUDGET_LIMIT=20
      - BUDGET_CURRENCY=EUR
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./workspace:/workspace
      - ./trading-team.json:/config/team.json:ro
    depends_on:
      - event-bus
    restart: unless-stopped

  # Agent: Opus Security (Veto Power)
  opus-security:
    image: openclaw/agent:latest
    container_name: opus-security
    environment:
      - AGENT_ID=opus-security
      - AGENT_MODEL=anthropic/claude-3-opus-20240229
      - AGENT_ROLE=security_audit
      - EVENT_BUS_HOST=event-bus
      - EVENT_BUS_PORT=6379
      - BUDGET_LIMIT=20
      - BUDGET_CURRENCY=USD
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VETO_POWER=true
    volumes:
      - ./workspace:/workspace
      - ./trading-team.json:/config/team.json:ro
    depends_on:
      - event-bus
    restart: unless-stopped

  # Heartbeat Monitor
  heartbeat-monitor:
    image: openclaw/agent:latest
    container_name: heartbeat-monitor
    environment:
      - MONITOR_MODE=true
      - EVENT_BUS_HOST=event-bus
      - EVENT_BUS_PORT=6379
      - HEARTBEAT_INTERVAL=300
    depends_on:
      - event-bus
      - kimi-dev
      - gemini-reviewer
      - opus-security
    restart: unless-stopped

volumes:
  event-bus-data:
