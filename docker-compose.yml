# docker-compose.yml — AutoBot V2
version: '3.8'

services:
  autobot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autobot-v2
    env_file:
      - .env
    restart: unless-stopped
    
    # Environnement
    environment:
      - TZ=Europe/Paris
      - APP_ENV=${APP_ENV:-production}
      - DEPLOYMENT_STAGE=${DEPLOYMENT_STAGE:-paper}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET}
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
      - DASHBOARD_SSL_CERT=/app/certs/server.crt
      - DASHBOARD_SSL_KEY=/app/certs/server.key
      # Mode de healthcheck:
      # - tls   (défaut): vérification TLS stricte via CA locale (/app/certs/server.crt)
      # - local         : endpoint HTTP interne (127.0.0.1) sans TLS, réservé au réseau local du conteneur
      - HEALTHCHECK_MODE=${HEALTHCHECK_MODE:-tls}
      - HEALTHCHECK_URL_TLS=${HEALTHCHECK_URL_TLS:-https://localhost:8080/health}
      - HEALTHCHECK_URL_LOCAL=${HEALTHCHECK_URL_LOCAL:-http://127.0.0.1:8080/health}
      - HEALTHCHECK_CA_CERT=${HEALTHCHECK_CA_CERT:-/app/certs/server.crt}
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-100}
      - MAX_INSTANCES=${MAX_INSTANCES:-10}
      - PAPER_TRADING=${PAPER_TRADING:-true}
      - LIVE_TRADING_CONFIRMATION=${LIVE_TRADING_CONFIRMATION:-false}
      - API_KEY_ASSIGNMENT_MODE=${API_KEY_ASSIGNMENT_MODE:-dedicated}
      - ALLOW_SHARED_API_KEY=${ALLOW_SHARED_API_KEY:-false}
      - UNIQUE_BOT_ID=${UNIQUE_BOT_ID:-}
      - API_KEY_ASSIGNED_BOT_ID=${API_KEY_ASSIGNED_BOT_ID:-}
      - LEAKED_SSH_KEY_ROTATED_ACK=${LEAKED_SSH_KEY_ROTATED_ACK:-false}
      - MAX_DRAWDOWN_PCT=${MAX_DRAWDOWN_PCT:-10}
      - RISK_PER_TRADE_PCT=${RISK_PER_TRADE_PCT:-1}
      - MAX_POSITION_SIZE_PCT=${MAX_POSITION_SIZE_PCT:-20}
    
    # Ports exposés
    ports:
      - "0.0.0.0:8080:8080"
    
# Volumes persistants
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./certs:/app/certs:ro
    
    # Limites ressources (CAX11 = 4GB RAM, 2 vCPU ARM64)
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.5'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Health check
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ \"$${HEALTHCHECK_MODE:-tls}\" = \"local\" ]; then curl --fail --silent --show-error \"$${HEALTHCHECK_URL_LOCAL:-http://127.0.0.1:8080/health}\"; else curl --fail --silent --show-error --cacert \"$${HEALTHCHECK_CA_CERT:-/app/certs/server.crt}\" \"$${HEALTHCHECK_URL_TLS:-https://localhost:8080/health}\"; fi"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
