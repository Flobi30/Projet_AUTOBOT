# docker-compose.yml — AutoBot V2
version: '3.8'

services:
  autobot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autobot-v2
    restart: unless-stopped
    
    # Environnement
    environment:
      - TZ=Europe/Paris
      - ENV=${ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET}
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
      - DASHBOARD_SSL_CERT=/app/certs/server.crt
      - DASHBOARD_SSL_KEY=/app/certs/server.key
      - INITIAL_CAPITAL=${INITIAL_CAPITAL:-100}
      - MAX_INSTANCES=${MAX_INSTANCES:-10}
      - PAPER_TRADING=${PAPER_TRADING:-true}
    
    # Ports exposés
    ports:
      - "127.0.0.1:8080:8080"
    
# Volumes persistants
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - ./certs:/app/certs:ro
    
    # Limites ressources (CAX11 = 4GB RAM, 2 vCPU ARM64)
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.5'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8080/health", "-k"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
