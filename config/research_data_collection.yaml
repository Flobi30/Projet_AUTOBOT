include_runtime_active_symbols: true

priority_symbols:
  - BTCZEUR
  - ETHZEUR
  - XLMZEUR
  - TRXEUR

secondary_symbols:
  - ADAEUR
  - AVAXEUR
  - SOLEUR
  - DOTEUR
  - LINKEUR
  - XRPEUR

timeframes:
  - 5m
  - 15m
  - 1h

ohlcv:
  max_pages: 5
  dedupe: true
  fail_on_gaps: false
  export_csv: true
  export_parquet: false

# Each daily raw batch is immediately canonicalized and materialized as a
# point-in-time feature snapshot. These artifacts are research-only evidence;
# they do not activate shadow, paper, promotion or live trading.
canonical_features:
  enabled: true
  feature_ids:
    - return_1_bps
    - momentum_3_bps
    - volatility_20_bps
    - atr_14_bps

microstructure:
  depth_count: 10
  sample_interval_seconds: 60
  samples_per_run: 60

high_conviction_walk_forward:
  enabled: true
  output_dir: reports/research/high_conviction_walk_forward
  # 15m bars: 3 days warm-up, then independent 2-day OOS folds.
  train_window_bars: 288
  test_window_bars: 192
  step_window_bars: 192
  min_folds: 3
  min_positive_fold_ratio: 0.60
  min_closed_trades_for_review: 50
  min_expected_move_bps: 500
  risk_reward_ratio: 2
  max_hold_hours: 72
  exit_modes:
    - fixed_tp_sl
    - trailing
  primary_exit_mode: fixed_tp_sl

# This is a read-only research meta-allocator. It uses the collected OHLCV
# files, writes reports only, and cannot create child instances or orders.
strategy_orchestrator:
  enabled: true
  output_dir: reports/research/strategy_orchestrator
  instance_id: research-parent-001
  initial_treasury_eur: 500
  max_instance_exposure_pct: 0.60
  max_strategy_exposure_pct: 0.50
  max_symbol_exposure_pct: 0.20
  max_open_positions: 3
  cooldown_hours: 6
  max_daily_loss_pct: 0.03
  max_drawdown_pct: 0.10
  min_research_meta_score: 20
  signal_history_bars: 384

# This consumes the High Conviction and Strategy Orchestrator JSON reports
# generated above, writes research-only edge triage, and cannot promote
# strategies or create orders.
strategy_edge_review:
  enabled: true
  output_dir: reports/research/strategy_edge
  min_candidate_trades: 50
  min_candidate_pf: 1.30
  high_quality_pf: 1.50
  max_drawdown_pct: 10
  max_single_symbol_positive_share: 0.40

# Deliberately disabled until the canonical feature path is also the runtime
# shadow producer. Raw historical CSV replays are useful research artifacts,
# but must not write attributed observations into the official shadow ledger:
# their real-time decision parity has not yet been proven.
shadow_observation_sync:
  enabled: false
  state_db_path: data/autobot_state.db
  registry_path: docs/research/strategy_hypotheses.json
  trend_shadow_db_path: data/trend_shadow_lab.db
  mean_reversion_shadow_db_path: data/mean_reversion_shadow_lab.db
  output_dir: reports/paper/shadow_observations
  high_conviction_output_dir: data/research/high_conviction_shadow_sync

output_dirs:
  ohlcv: data/research/daily/ohlcv
  microstructure: data/research/daily/microstructure
  reports: reports/research/daily_data_collection
  canonical_ohlcv: data/research/canonical/ohlcv
  canonical_manifests: data/research/manifests
  canonical_quarantine: data/research/quarantine
  canonical_features: data/research/canonical/features
  feature_manifests: data/research/manifests

safety:
  public_endpoints_only: true
  no_private_keys: true
  no_orders: true
  research_only: true
